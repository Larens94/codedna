<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#080c11"/>
  </linearGradient>
  <filter id="sh" x="-4%" y="-4%" width="108%" height="108%">
    <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.55"/>
  </filter>
  <filter id="sh-sm" x="-4%" y="-4%" width="108%" height="108%">
    <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
  </filter>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
    <path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#3d444d" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </marker>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.9" fill="#161b22"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="900" height="600" fill="url(#bg)"/>
<rect width="900" height="600" fill="url(#dots)"/>

<!-- Header -->
<rect width="900" height="78" fill="#161b22" opacity="0.98"/>
<rect y="77" width="900" height="1" fill="#21262d"/>

<!-- Version badge -->
