<text x="490" y="63" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="12" fill="#8b949e">Four levels of in-source context — navigated by AI agents on every session</text>

<!-- Granularity arrow -->
