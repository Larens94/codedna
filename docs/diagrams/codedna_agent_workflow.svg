<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 740" width="900" height="740">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#080c11"/>
  </linearGradient>
  <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
    <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
  </filter>
  <marker id="arr-d" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
    <path d="M1,1 L5,9 L9,1" fill="none" stroke="#3d444d" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </marker>
  <marker id="arr-l" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto">
    <path d="M9,1 L1,5 L9,9" fill="none" stroke="#d29922" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </marker>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.9" fill="#161b22"/>
  </pattern>
</defs>

<rect width="900" height="740" fill="url(#bg)"/>
<rect width="900" height="740" fill="url(#dots)"/>

<!-- Header -->
<rect width="900" height="78" fill="#161b22" opacity="0.98"/>
<rect y="77" width="900" height="1" fill="#21262d"/>
<rect x="32" y="22" width="112" height="28" rx="14" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
<text x="88" y="40" text-anchor="middle" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" font-weight="600" fill="#58a6ff">CodeDNA  v0.7</text>
<text x="490" y="42" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="22" font-weight="700" fill="#e6edf3" letter-spacing="-0.3">Agent Workflow</text>
<text x="490" y="63" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="12" fill="#8b949e">Session lifecycle — start · edit cycle · end</text>

<!-- ════════════════════════════════════════
     PHASE 1 — SESSION START
     ════════════════════════════════════════ -->
<!-- Phase banner -->
<rect x="200" y="92" width="500" height="34" rx="8" fill="#091424" stroke="#58a6ff" stroke-width="1" filter="url(#sh)"/>
<circle cx="228" cy="109" r="10" fill="#58a6ff"/>
<text x="228" y="114" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#0d1117">01</text>
<text x="452" y="114" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="13" font-weight="700" fill="#58a6ff" letter-spacing="1.5">SESSION  START</text>

<!-- Node 1 -->
<rect x="240" y="138" width="420" height="52" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1" filter="url(#sh)"/>
<rect x="240" y="138" width="4" height="52" rx="2" fill="#58a6ff"/>
<text x="268" y="158" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Read  .codedna</text>
<text x="268" y="177" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" fill="#8b949e">project map · last 3–5 agent_sessions entries</text>
<!-- connector -->
<line x1="450" y1="190" x2="450" y2="206" stroke="#3d444d" stroke-width="1.5" marker-end="url(#arr-d)"/>

<!-- Node 2 -->
<rect x="240" y="210" width="420" height="52" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1" filter="url(#sh)"/>
<rect x="240" y="210" width="4" height="52" rx="2" fill="#58a6ff"/>
<text x="268" y="230" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Read module docstrings  (first 8–12 lines)</text>
<text x="268" y="249" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" fill="#8b949e">manifest-only read — do not open files in full yet</text>
<line x1="450" y1="262" x2="450" y2="278" stroke="#3d444d" stroke-width="1.5" marker-end="url(#arr-d)"/>

<!-- Node 3 -->
<rect x="240" y="282" width="420" height="52" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1" filter="url(#sh)"/>
<rect x="240" y="282" width="4" height="52" rx="2" fill="#58a6ff"/>
<text x="268" y="302" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Build  exports → used_by  graph</text>
<text x="268" y="321" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" fill="#8b949e">open only relevant files in full · filter by rules: domain</text>

<line x1="450" y1="334" x2="450" y2="352" stroke="#3d444d" stroke-width="1.5" marker-end="url(#arr-d)"/>

<!-- ════════════════════════════════════════
     PHASE 2 — EDIT CYCLE
     ════════════════════════════════════════ -->
<rect x="200" y="356" width="500" height="34" rx="8" fill="#1c1608" stroke="#d29922" stroke-width="1" filter="url(#sh)"/>
<circle cx="228" cy="373" r="10" fill="#d29922"/>
<text x="228" y="378" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#0d1117">02</text>
<text x="452" y="378" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="13" font-weight="700" fill="#d29922" letter-spacing="1.5">EDIT  CYCLE</text>

<!-- Node 4 -->
<rect x="240" y="402" width="420" height="52" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1" filter="url(#sh)"/>
<rect x="240" y="402" width="4" height="52" rx="2" fill="#d29922"/>
<text x="268" y="422" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Re-read  rules:  ·  agent:  ·  function  Rules:</text>
<text x="268" y="441" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" fill="#8b949e">first step on every edit — never skip</text>
<line x1="450" y1="454" x2="450" y2="470" stroke="#3d444d" stroke-width="1.5" marker-end="url(#arr-d)"/>

<!-- Node 5 -->
<rect x="240" y="474" width="420" height="52" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1" filter="url(#sh)"/>
<rect x="240" y="474" width="4" height="52" rx="2" fill="#d29922"/>
<text x="268" y="494" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Write logic  ·  update  rules:  if constraint found</text>
<text x="268" y="513" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" fill="#8b949e">architectural channel — constraints go in rules:, not comments</text>
<line x1="450" y1="526" x2="450" y2="542" stroke="#3d444d" stroke-width="1.5" marker-end="url(#arr-d)"/>

<!-- Node 6 -->
<rect x="240" y="546" width="420" height="52" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1" filter="url(#sh)"/>
<rect x="240" y="546" width="4" height="52" rx="2" fill="#d29922"/>
<text x="268" y="566" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Append  agent:  line  to module docstring</text>
<text x="268" y="585" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" fill="#8b949e">model-id | YYYY-MM-DD | what you did · append-only, never edit</text>
<line x1="450" y1="598" x2="450" y2="614" stroke="#3d444d" stroke-width="1.5" marker-end="url(#arr-d)"/>

<!-- Decision diamond: more edits? -->
<polygon points="450,618 520,648 450,678 380,648" fill="#1c1608" stroke="#d29922" stroke-width="1.5"/>
<text x="450" y="643" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" font-weight="600" fill="#d29922">more edits?</text>
<text x="450" y="657" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="10" fill="#8b949e">check used_by:</text>

<!-- Loop arrow: YES — go back to node 4 -->
<line x1="520" y1="648" x2="760" y2="648" stroke="#d29922" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
<line x1="760" y1="648" x2="760" y2="428" stroke="#d29922" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
<line x1="760" y1="428" x2="662" y2="428" stroke="#d29922" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arr-l)"/>
<text x="774" y="546" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#d29922" transform="rotate(90,774,546)">YES</text>

<!-- NO label and arrow to phase 3 -->
<line x1="450" y1="678" x2="450" y2="694" stroke="#3d444d" stroke-width="1.5" marker-end="url(#arr-d)"/>
<text x="462" y="690" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#8b949e">NO</text>

<!-- ════════════════════════════════════════
     PHASE 3 — SESSION END
     ════════════════════════════════════════ -->
<rect x="200" y="696" width="500" height="34" rx="8" fill="#0a1a0e" stroke="#3fb950" stroke-width="1" filter="url(#sh)"/>
<circle cx="228" cy="713" r="10" fill="#3fb950"/>
<text x="228" y="718" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#0d1117">03</text>
<text x="452" y="718" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="13" font-weight="700" fill="#3fb950" letter-spacing="1.5">SESSION  END</text>

<!-- Footer -->
<rect y="704" width="900" height="36" fill="#161b22" opacity="0.6"/>
<rect y="703" width="900" height="1" fill="#21262d"/>
<text x="450" y="720" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#8b949e">→ append agent_sessions: to .codedna  ·  commit with AI-Agent: AI-Session: AI-Visited: trailers</text>
</svg>
