<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#080c11"/>
  </linearGradient>
  <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
    <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.55"/>
  </filter>
  <marker id="arr-r" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
    <path d="M1,1 L9,5 L1,9" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </marker>
  <marker id="arr-l" markerWidth="10" markerHeight="10" refX="2" refY="5" orient="auto">
    <path d="M9,1 L1,5 L9,9" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </marker>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.9" fill="#161b22"/>
  </pattern>
</defs>

<rect width="900" height="520" fill="url(#bg)"/>
<rect width="900" height="520" fill="url(#dots)"/>

<!-- Header -->
<rect width="900" height="78" fill="#161b22" opacity="0.98"/>
<rect y="77" width="900" height="1" fill="#21262d"/>
<rect x="32" y="22" width="112" height="28" rx="14" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
<text x="88" y="40" text-anchor="middle" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" font-weight="600" fill="#58a6ff">CodeDNA  v0.7</text>
<text x="490" y="42" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="22" font-weight="700" fill="#e6edf3" letter-spacing="-0.3">Three-Tier Audit</text>
<text x="490" y="63" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="12" fill="#8b949e">session_id links all three tiers — git is the source of truth</text>

<!-- ══════════════════════════════════
     COLUMN 1: GIT LOG
     ══════════════════════════════════ -->
<rect x="30" y="96" width="256" height="344" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1" filter="url(#sh)"/>
