<rect x="30" y="136" width="256" height="12" fill="#1a1608"/>
<text x="158" y="116" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="14" font-weight="700" fill="#d29922">Git Log</text>
<text x="158" y="135" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" fill="#8b949e">Authoritative Audit</text>
<!-- badge -->
<rect x="50" y="158" width="86" height="18" rx="9" fill="#1a1608" stroke="#d29922" stroke-width="0.75"/>
<text x="93" y="170" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#d29922" font-weight="600">GIT TRAILERS</text>
<!-- content -->
<rect x="46" y="185" width="224" height="238" rx="8" fill="#0a0d12" stroke="#21262d" stroke-width="1"/>
<text x="60" y="207" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">feat: add render fn</text>
<text x="60" y="225" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">&#160;</text>
<text x="60" y="243" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#d29922">AI-Agent:</text>
<text x="152" y="243" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#a5d6ff">claude-sonnet-4-6</text>
<text x="60" y="261" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#d29922">AI-Provider:</text>
<text x="152" y="261" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#a5d6ff">anthropic</text>
<text x="60" y="279" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#d29922">AI-Session:</text>
<text x="152" y="279" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#f0b429">s_20260320_001</text>
<text x="60" y="297" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#d29922">AI-Visited:</text>
<text x="152" y="297" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="10" fill="#a5d6ff">app.py, render.py</text>
<text x="60" y="315" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#d29922">AI-Message:</text>
<text x="60" y="333" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="10" fill="#8b949e">  noticed perf issue</text>
<text x="60" y="350" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="10" fill="#8b949e">  in row fetching</text>
<!-- divider -->
<line x1="60" y1="365" x2="254" y2="365" stroke="#21262d" stroke-width="1"/>
<text x="158" y="383" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#8b949e">immutable · queryable · permanent</text>
<text x="158" y="399" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#8b949e">git log --grep AI-Session: s_20260320_001</text>

<!-- ══════════════════════════════════
     COLUMN 2: .codedna
     ══════════════════════════════════ -->
<rect x="322" y="96" width="256" height="344" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1" filter="url(#sh)"/>
<rect x="322" y="96" width="256" height="5" rx="5" fill="#58a6ff"/>
<rect x="322" y="96" width="256" height="52" rx="10" fill="#091424"/>
<rect x="322" y="136" width="256" height="12" fill="#091424"/>
<text x="450" y="116" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="14" font-weight="700" fill="#58a6ff">.codedna</text>
<text x="450" y="135" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" fill="#8b949e">Navigation Cache</text>
<rect x="342" y="158" width="100" height="18" rx="9" fill="#091424" stroke="#58a6ff" stroke-width="0.75"/>
<text x="392" y="170" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#58a6ff" font-weight="600">AGENT SESSIONS</text>
<rect x="338" y="185" width="224" height="238" rx="8" fill="#0a0d12" stroke="#21262d" stroke-width="1"/>
<text x="352" y="207" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">agent_sessions:</text>
<text x="352" y="225" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">  - agent: <tspan fill="#a5d6ff">claude-sonnet</tspan></text>
<text x="352" y="243" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">    date: <tspan fill="#a5d6ff">2026-03-20</tspan></text>
<text x="352" y="261" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">    session_id: <tspan fill="#f0b429">s_20260320_001</tspan></text>
<text x="352" y="279" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">    task: <tspan fill="#a5d6ff">"add render fn"</tspan></text>
<text x="352" y="297" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">    changed: <tspan fill="#a5d6ff">[render.py]</tspan></text>
<text x="352" y="315" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">    visited: <tspan fill="#a5d6ff">[app.py,</tspan></text>
<text x="352" y="333" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#a5d6ff">             render.py]</text>
<text x="352" y="351" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">    message: &gt; perf issue...</text>
<line x1="352" y1="365" x2="546" y2="365" stroke="#21262d" stroke-width="1"/>
<text x="450" y="383" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#8b949e">lean cache · fast agent navigation</text>
<text x="450" y="399" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#8b949e">changed ≠ visited — two analytics signals</text>

<!-- ══════════════════════════════════
     COLUMN 3: file agent:
     ══════════════════════════════════ -->
<rect x="614" y="96" width="256" height="344" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1" filter="url(#sh)"/>
<rect x="614" y="96" width="256" height="5" rx="5" fill="#bc8cff"/>
<rect x="614" y="96" width="256" height="52" rx="10" fill="#110d1c"/>
<rect x="614" y="136" width="256" height="12" fill="#110d1c"/>
<text x="742" y="116" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="14" font-weight="700" fill="#bc8cff">file  agent:</text>
<text x="742" y="135" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="11" fill="#8b949e">Sliding Window</text>
<rect x="634" y="158" width="110" height="18" rx="9" fill="#110d1c" stroke="#bc8cff" stroke-width="0.75"/>
<text x="689" y="170" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#bc8cff" font-weight="600">MODULE DOCSTRING</text>
<rect x="630" y="185" width="224" height="238" rx="8" fill="#0a0d12" stroke="#21262d" stroke-width="1"/>
<text x="644" y="207" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">"""render.py — render</text>
<text x="644" y="224" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">  dashboard HTML.</text>
<text x="644" y="243" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">&#160;</text>
<text x="644" y="261" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#79c0ff">exports: <tspan fill="#8b949e">render -&gt; str</tspan></text>
<text x="644" y="279" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#79c0ff">rules:   <tspan fill="#8b949e">cap at 1000</tspan></text>
<text x="644" y="297" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#d2a8ff">agent:   <tspan fill="#a5d6ff">claude |</tspan></text>
<text x="644" y="315" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="10" fill="#a5d6ff">  2026-03-20 |</tspan></text>
<text x="644" y="333" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="10" fill="#8b949e">  added render fn</text>
<text x="644" y="351" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#8b949e">"""</text>
<line x1="644" y1="365" x2="838" y2="365" stroke="#21262d" stroke-width="1"/>
<text x="742" y="383" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#8b949e">always in context window · append-only</text>
<text x="742" y="399" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#8b949e">one-liner per session — terse by design</text>

